          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProtectedSender'
    post:
      tags: [Protection]
      summary: Add senders to protection whitelist
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emails]
              properties:
                emails:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Senders protected
    delete:
      tags: [Protection]
      summary: Remove senders from protection whitelist
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emails]
              properties:
                emails:
                  type: array
                  items:
                    type: string
      responses:
